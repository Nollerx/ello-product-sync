# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "bf99e755a15b78cc0dc496d45f1cd75e"
name = "Ello VTO Public"
application_url = "https://ello-vto-public-13593516897-u5htiuxfrq-uc.a.run.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  # Catalog changes must bump config_version so the widget's cached
  # enabled-handles list (ETag) invalidates — otherwise new products never
  # show the try-on button in 'all'/'collections' mode until settings re-save.
  [[webhooks.subscriptions]]
  topics = [ "products/create", "products/delete", "products/update" ]
  uri = "/webhooks/products"

  # Returns netting for Qualified Revenue: refunded tried-on lines are
  # subtracted from attributed revenue and power the tried-on return-rate stat.
  # Requires the read_orders scope below (merchant re-consent on next admin open).
  [[webhooks.subscriptions]]
  topics = [ "refunds/create" ]
  uri = "/webhooks/refunds"

  [[webhooks.subscriptions]]
  uri = "/api/privacy"
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# read_orders: refunds/create webhook (returns netting). Order data is Shopify
# "protected customer data" — Level 1 access must be declared in the Partner
# Dashboard before this can be released.
scopes = "read_products,unauthenticated_read_product_listings,unauthenticated_read_product_tags,read_customer_events,read_orders,read_pixels,write_pixels,read_themes"

[auth]
redirect_urls = [
  "https://ello-vto-public-13593516897-u5htiuxfrq-uc.a.run.app/auth/callback"
]
