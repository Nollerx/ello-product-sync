<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview crop test</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    padding: 40px 20px;
    background: #6b7280;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    box-sizing: border-box;
  }

  .controls {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    max-width: 520px;
    background: #fff;
    padding: 16px;
    border-radius: 12px;
  }
  .controls label { font-size: 12px; font-weight: 600; color: #374151; }
  .controls input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 13px;
    box-sizing: border-box;
  }
  .controls .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .controls button {
    padding: 8px 14px;
    border: none;
    border-radius: 8px;
    background: #111;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
  }

  /* ---- Mirror of the real widget-template.html preview CSS ---- */
  .widget-preview {
    background: #111111;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    border: 1px solid #333;
    border-radius: 24px;
    padding: 32px;
    width: 420px;
    box-sizing: border-box;
  }

  .preview-content-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    width: 100%;
  }

  .preview-product-thumb {
    width: 128px;
    height: 192px;
    border-radius: 12px;
    object-fit: cover;
    object-position: top center;
    border-color: #444;
    background: #222;
    display: block;
  }

  .preview-arrow-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #d1d5db;
  }

  .preview-upload-tile {
    width: 128px;
    height: 192px;
    border-radius: 12px;
    border: 1px solid #444;
    background: #222;
    position: relative;
    overflow: hidden;
  }

  .preview-upload-tile img.preview-user-photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    position: absolute;
    top: 0;
    left: 0;
    display: block;
  }

  .preview-actions { margin-top: 24px; }
  .preview-try-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 999px;
    background: #ffffff;
    color: #000000;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.02em;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div class="controls">
    <label>Left image URL (product)</label>
    <input id="leftUrl" type="text" placeholder="https://...product.jpg">
    <label>Right image URL (your photo)</label>
    <input id="rightUrl" type="text" placeholder="https://...person.jpg">
    <div class="row">
      <button onclick="apply()">Update images</button>
      <label style="font-weight:400">Tile height:
        <input id="ht" type="number" value="192" style="width:70px;display:inline-block">px
      </label>
    </div>
  </div>

  <div class="widget-preview theme-dark">
    <div class="preview-content-row">
      <img id="leftImg" class="preview-product-thumb" alt="Product"
           src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=600">
      <div class="preview-arrow-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </div>
      <div class="preview-upload-tile">
        <img id="rightImg" class="preview-user-photo" alt="Your photo"
             src="https://images.unsplash.com/photo-1488161628813-04466f872be2?w=600">
      </div>
    </div>
    <div class="preview-actions">
      <button class="preview-try-btn">GENERATE MY LOOK</button>
    </div>
  </div>

  <script>
    function apply() {
      const l = document.getElementById('leftUrl').value.trim();
      const r = document.getElementById('rightUrl').value.trim();
      const h = document.getElementById('ht').value.trim() || '192';
      if (l) document.getElementById('leftImg').src = l;
      if (r) document.getElementById('rightImg').src = r;
      document.getElementById('leftImg').style.height = h + 'px';
      document.querySelector('.preview-upload-tile').style.height = h + 'px';
    }
  </script>
</body>
</html>
