client_id = "3ab87c3a17258dd8b44f288b81b7dfc7"
name = "Custom Ello App"
application_url = "https://custom-ello-app-13593516897-13593516897.us-central1.run.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "unauthenticated_read_product_listings,unauthenticated_read_product_tags,read_customer_events,read_pixels,write_pixels"

[auth]
redirect_urls = [ "https://custom-ello-app-13593516897-13593516897.us-central1.run.app/auth/callback" ]
